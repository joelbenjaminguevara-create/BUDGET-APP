<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"/>
<title>Budget (Blank)</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<link rel="icon" href="./icon-192.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Budget New"/>
<meta name="theme-color" content="#1F3D34"/>
<style>html,body,#root{margin:0;padding:0;min-height:100vh;background:#F6F3EC;}</style>
</head>
<body>
<div id="root"></div>
<script>
/* Local storage shim — replaces Claude's window.storage with the browser's own
   localStorage, so the app never talks to a network again. Same method
   signatures as the original tool, including throwing on a missing key,
   so Portal.jsx needs zero code changes. */
(function(){
  var PFX = "bp_";
  window.storage = {
    get: function(key, shared){
      return new Promise(function(resolve, reject){
        var raw = localStorage.getItem(PFX + key);
        if (raw == null) { reject(new Error("not found")); return; }
        resolve({ key: key, value: raw, shared: !!shared });
      });
    },
    set: function(key, value, shared){
      return new Promise(function(resolve, reject){
        try { localStorage.setItem(PFX + key, value); resolve({ key: key, value: value, shared: !!shared }); }
        catch(e){ reject(e); }
      });
    },
    delete: function(key, shared){
      return new Promise(function(resolve){
        localStorage.removeItem(PFX + key);
        resolve({ key: key, deleted: true, shared: !!shared });
      });
    },
    list: function(prefix, shared){
      return new Promise(function(resolve){
        var p = PFX + (prefix || "");
        var keys = Object.keys(localStorage).filter(function(k){return k.indexOf(p)===0;}).map(function(k){return k.slice(PFX.length);});
        resolve({ keys: keys, prefix: prefix, shared: !!shared });
      });
    }
  };
})();
</script>
<script src="./bundle.js"></script>
</body>
</html>
